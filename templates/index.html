<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Local RAG Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <div class="container-fluid h-100 p-0 d-flex">
        <div class="d-flex flex-column border-end sidebar p-3">
            <div class="d-flex align-items-center mb-4 mt-2 px-2">
                <i class="bi bi-cpu text-primary fs-3 me-2"></i>
                <h5 class="m-0 fw-bold text-dark">RAG Workspace</h5>
            </div>
            
            <button id="upload-btn" class="btn btn-secondary rounded-pill mb-2 shadow-sm py-2 fw-medium" onclick="pickFile(false)" disabled>
                <i class="bi bi-hourglass-split me-1"></i> รอเชื่อมต่อ...
            </button>
            <button id="append-btn" class="btn btn-outline-primary rounded-pill mb-3 py-2 fw-medium d-none" onclick="pickFile(true)">
                <i class="bi bi-plus-circle me-1"></i> เพิ่มไฟล์ในห้องเดิม
            </button>

            <h6 class="text-muted fs-6 mt-2 mb-3 px-2"><i class="bi bi-clock-history me-1"></i> ประวัติแชท</h6>
            <div id="session-list" class="flex-grow-1 overflow-auto pe-1"></div>
        </div>

        <div class="d-flex flex-column flex-grow-1 position-relative">
            <nav class="navbar bg-white border-bottom px-4 py-3 d-flex shadow-sm" style="z-index: 5;">
                <span class="navbar-brand mb-0 h1 fs-6 text-secondary d-flex align-items-center" id="current-doc-title">
                    <span class="badge bg-secondary me-2 rounded-pill px-3 py-2 fw-normal">ยังไม่ได้เลือกเอกสาร</span>
                </span>
                <div class="d-flex align-items-center ms-auto gap-2">
                    <select id="model-selector" class="form-select rounded-pill px-3 py-1 border-primary text-primary fw-medium d-none" style="width: auto;">
                        <option value="llama3">Llama 3</option>
                        <option value="qwen2.5:7b">Qwen 2.5</option>
                    </select>
                    <button id="export-btn" class="btn btn-outline-secondary btn-sm rounded-pill px-3 py-2 fw-medium d-none" onclick="exportChat()">
                        <i class="bi bi-download me-1"></i> บันทึกแชท
                    </button>
                </div>
            </nav>

            <div id="chat-box" class="d-flex flex-column">
                <div class="msg ai shadow-sm"><i class="bi bi-robot fs-5 me-2 text-primary"></i> สวัสดีครับ! อัปโหลดเอกสารทางซ้ายมือเพื่อเริ่มใช้งานได้เลย</div>
            </div>

            <div class="chat-input-area">
                <div class="input-group custom-input-group">
                    <input type="text" id="query-input" class="form-control" placeholder="พิมพ์คำถาม..." disabled>
                    <button class="btn btn-primary" id="send-btn" onclick="send()" disabled>
                        <i class="bi bi-send-fill"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
